version: "1"

params:
  schema:
    codeFormattingCommand:
      name: "Code formatting command"
      default: npm i -g prettier && npx prettier --write "**/eslint.config.mjs" --ignore-path /dev/null --no-config
      type: string
      description: "Command to format the code"

nodes:
  - id: apply-transforms
    name: Apply ESLint v8 to v9 Config Migration
    type: automatic
    steps:
      - id: scan-ignore-files
        name: "Scan ignore files"
        js-ast-grep:
          js_file: scripts/ignore-files.ts
          max_threads: 1
          include:
            - "**/.gitignore"
            - "**/.eslintignore"
      - id: fix-exported-comments
        name: "Fix exported comments"
        js-ast-grep:
          js_file: scripts/fix-exported-comment.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: remove-unnecessary-eslint-comments
        name: "Remove unnecessary eslint comments"
        js-ast-grep:
          js_file: scripts/remove-unnecessary-eslint-comments.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: scan-file-jsdoc
        name: "Scan file-jsdoc.ts"
        depends_on:
          - remove-unnecessary-eslint-comments
        js-ast-grep:
          js_file: scripts/file-jsdoc.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: scan-eslintrc-files
        name: "Scan .eslintrc.js, .eslintrc.mjs, .eslintrc.cjs, .eslintrc.json, .eslintrc.yaml and .eslintrc.yml"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*.eslintrc.js"
            - "**/*.eslintrc.mjs"
            - "**/*.eslintrc.cjs"
            - "**/*.eslintrc.json"
            - "**/*.eslintrc.yaml"
            - "**/*.eslintrc.yml"
      - id: code-formating
        depends_on:
          - move-eslintrc-files
        name: "Code formating"
        run: ${{ params.codeFormattingCommand }}
