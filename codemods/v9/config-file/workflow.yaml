version: "1"

params:
  schema:
    codeFormattingCommandEnabled:
      name: "Code formatting command enabled"
      default: false
      type: boolean
      description: "Should formatting command run or not"
    codeFormattingCommand:
      name: "Code formatting command"
      default: npx prettier --write "**/eslint.config.mjs" --ignore-path /dev/null --no-config --no-error-on-unmatched-pattern
      type: string
      description: "Command to format the code"
    eslintConfigCustomName:
      name: "Custom name of ESLint config file"
      default: null
      type: string
      description: "Name of the custom ESLint config file"
    eslintConfigLanguage:
      name: "Language of ESLint config file"
      default: javascript
      type: string
      description: >-
        ast-grep language for `eslintConfigCustomName` (must match the file extension).
        Use `javascript` for .js / .mjs / .cjs; `json` for .json; `yaml` for .yaml / .yml.

nodes:
  - id: apply-transforms
    name: Apply ESLint v8 to v9 Config Migration
    type: automatic
    steps:
      - id: scan-ignore-files
        name: "Scan ignore files"
        js-ast-grep:
          js_file: scripts/ignore-files.ts
          max_threads: 1
          include:
            - "**/.gitignore"
            - "**/.eslintignore"
      - id: fix-exported-comments
        name: "Fix exported comments"
        js-ast-grep:
          js_file: scripts/fix-exported-comment.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: remove-unnecessary-eslint-comments
        name: "Remove unnecessary eslint comments"
        js-ast-grep:
          js_file: scripts/remove-unnecessary-eslint-comments.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: scan-file-jsdoc
        name: "Scan file-jsdoc.ts"
        depends_on:
          - remove-unnecessary-eslint-comments
        js-ast-grep:
          js_file: scripts/file-jsdoc.ts
          include:
            - "**/*.ts"
            - "**/*.js"
      - id: scan-js-eslintrc-files
        name: "Scan .eslintrc.js, .eslintrc.mjs, .eslintrc.cjs"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: javascript
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*.eslintrc.js"
            - "**/*.eslintrc.mjs"
            - "**/*.eslintrc.cjs"
      - id: scan-json-eslintrc-files
        name: "Scan .eslintrc.json"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: json
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*.eslintrc.json"
      - id: scan-yaml-eslintrc-files
        name: "Scan .eslintrc.yaml and .eslintrc.yml"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: yaml
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*.eslintrc.yaml"
            - "**/*.eslintrc.yml"
      - id: scan-custom-eslint-config-javascript
        if: 'params.eslintConfigCustomName != "null" && params.eslintConfigLanguage == "javascript"'
        name: "Scan ESLint config file with custom name (JavaScript)"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: javascript
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*${{ params.eslintConfigCustomName }}"
      - id: scan-custom-eslint-config-json
        if: 'params.eslintConfigCustomName != "null" && params.eslintConfigLanguage == "json"'
        name: "Scan ESLint config file with custom name (JSON)"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: json
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*${{ params.eslintConfigCustomName }}"
      - id: scan-custom-eslint-config-yaml
        if: 'params.eslintConfigCustomName != "null" && params.eslintConfigLanguage == "yaml"'
        name: "Scan ESLint config file with custom name (YAML)"
        depends_on:
          - scan-file-jsdoc
          - scan-ignore-files
        js-ast-grep:
          language: yaml
          js_file: scripts/transform-eslintrc-config.ts
          include:
            - "**/*${{ params.eslintConfigCustomName }}"
      - id: scan-packagejson-files
        name: "Scan package.json"
        depends_on:
          - scan-js-eslintrc-files
          - scan-json-eslintrc-files
          - scan-yaml-eslintrc-files
          - scan-custom-eslint-config-javascript
          - scan-custom-eslint-config-typescript
          - scan-custom-eslint-config-json
          - scan-custom-eslint-config-yaml
        js-ast-grep:
          language: json
          js_file: scripts/transform-packagejson-config.ts
          include:
            - "**/*package.json"
      - id: code-formating
        if: params.codeFormattingCommandEnabled == true
        depends_on:
          - scan-packagejson-files
        name: "Code formating"
        run: ${{ params.codeFormattingCommand }}
