# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: Apply ESLint v8 to v9 Custom Rules Migration
    type: automatic
    steps:
      - id: convert-to-new-rule-format
        name: 'Convert to new rule format'
        js-ast-grep:
          js_file: scripts/new-rule-format.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx' # Unlikely to be used for custom rules, but just in case
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx' # Unlikely to be used for custom rules, but just in case
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
      - id: replace-context-methods
        name: 'Replace context methods'
        depends_on:
          - convert-to-new-rule-format
        js-ast-grep:
          js_file: scripts/replace-context-method.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx' # Unlikely to be used for custom rules, but just in case
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx' # Unlikely to be used for custom rules, but just in case
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
      - id: replace-current-statement
        name: 'Replace current statement'
        depends_on:
          - convert-to-new-rule-format
          - replace-context-methods
        js-ast-grep:
          js_file: scripts/replace-current-statement.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx' # Unlikely to be used for custom rules, but just in case
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx' # Unlikely to be used for custom rules, but just in case
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
      - id: replace-sourcecode-getcomments
        name: 'Replace sourceCode.getComments()'
        depends_on:
          - replace-context-methods
        js-ast-grep:
          js_file: scripts/replace-sourcecode-getcomments.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
      - id: migrate-rule-tester
        name: 'Migrate RuleTester usage for ESLint v9'
        depends_on:
          - replace-current-statement
        js-ast-grep:
          js_file: scripts/migrate-rule-tester.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
      - id: migrate-integration-api
        name: 'Migrate ESLint integration APIs for v9'
        depends_on:
          - migrate-rule-tester
        js-ast-grep:
          js_file: scripts/migrate-integration-api.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/node_modules/**'
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
