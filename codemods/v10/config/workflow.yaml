# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: Apply ESLint v9 to v10 Config Migration
    type: automatic
    steps:
      - id: remove-eslint-env-comments
        name: 'Remove eslint-env inline comments'
        js-ast-grep:
          js_file: scripts/remove-eslint-env-comments.ts
          include:
            - '**/*.ts'
            - '**/*.tsx'
            - '**/*.js'
            - '**/*.jsx'
            - '**/*.cjs'
            - '**/*.mjs'
      - id: remove-legacy-flags-js
        name: 'Remove legacy env vars and CLI flags (JS/TS)'
        depends_on:
          - remove-eslint-env-comments
        js-ast-grep:
          language: javascript
          js_file: scripts/remove-legacy-flags.ts
          include:
            - '**/*.ts'
            - '**/*.tsx'
            - '**/*.js'
            - '**/*.jsx'
            - '**/*.cjs'
            - '**/*.mjs'
      - id: remove-legacy-flags-json
        name: 'Remove legacy env vars and CLI flags (JSON)'
        depends_on:
          - remove-legacy-flags-js
        js-ast-grep:
          language: json
          js_file: scripts/remove-legacy-flags.ts
          include:
            - '**/*.json'
      - id: remove-legacy-flags-yaml
        name: 'Remove legacy env vars and CLI flags (YAML)'
        depends_on:
          - remove-legacy-flags-json
        js-ast-grep:
          language: yaml
          js_file: scripts/remove-legacy-flags.ts
          include:
            - '**/*.yaml'
            - '**/*.yml'
