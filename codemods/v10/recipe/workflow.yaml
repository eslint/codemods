# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: Apply ESLint v9 to v10 Migration
    type: automatic
    steps:
      - name: 'Remove legacy env vars and CLI flags'
        codemod:
          source: '@eslint/v9-to-v10-config'

      - name: 'Replace removed context and SourceCode methods'
        codemod:
          source: '@eslint/v9-to-v10-custom-rules'

      - name: 'Cleanup RuleTester test cases'
        codemod:
          source: '@eslint/v9-to-v10-ruletester'

      - name: 'Fix Linter/ESLint API usage'
        codemod:
          source: '@eslint/v9-to-v10-linter-api'
