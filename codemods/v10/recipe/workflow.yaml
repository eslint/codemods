# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: '1'

nodes:
  - id: apply-transforms
    name: Apply ESLint v9 to v10 Migration
    type: automatic
    steps:
      # ── @eslint/v9-to-v10-config ─────────────────────────────────────────────

      - id: remove-legacy-flags-js
        name: 'Remove legacy env vars and CLI flags (JS/TS)'
        js-ast-grep:
          language: javascript
          js_file: ../config/scripts/remove-legacy-flags.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'

      - id: remove-legacy-flags-json
        name: 'Remove legacy env vars and CLI flags (JSON)'
        depends_on:
          - remove-legacy-flags-js
        js-ast-grep:
          language: json
          js_file: ../config/scripts/remove-legacy-flags-json.ts
          include:
            - '**/*.json'

      - id: remove-legacy-flags-yaml
        name: 'Remove legacy env vars and CLI flags (YAML)'
        depends_on:
          - remove-legacy-flags-json
        js-ast-grep:
          language: yaml
          js_file: ../config/scripts/remove-legacy-flags-yaml.ts
          include:
            - '**/*.yaml'
            - '**/*.yml'

      # ── @eslint/v9-to-v10-custom-rules ───────────────────────────────────────

      - id: replace-context-methods
        name: 'Replace removed context methods'
        depends_on:
          - remove-legacy-flags-yaml
        js-ast-grep:
          js_file: ../custom-rules/scripts/replace-context-methods.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'

      - id: replace-sourcecode-methods
        name: 'Replace removed SourceCode methods'
        depends_on:
          - replace-context-methods
        js-ast-grep:
          js_file: ../custom-rules/scripts/replace-sourcecode-methods.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'

      # ── @eslint/v9-to-v10-ruletester ─────────────────────────────────────────

      - id: cleanup-valid-cases
        name: 'Remove invalid properties from valid test cases'
        depends_on:
          - replace-sourcecode-methods
        js-ast-grep:
          js_file: ../ruletester/scripts/cleanup-valid-cases.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.cts'
            - '**/*.d.mts'

      - id: cleanup-invalid-cases
        name: 'Remove type property from invalid test cases'
        depends_on:
          - cleanup-valid-cases
        js-ast-grep:
          js_file: ../ruletester/scripts/cleanup-invalid-cases.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.cts'
            - '**/*.d.mts'

      # ── @eslint/v9-to-v10-linter-api ─────────────────────────────────────────

      - id: fix-linter-constructor
        name: 'Fix removed Linter/ESLint constructor options'
        depends_on:
          - cleanup-invalid-cases
        js-ast-grep:
          js_file: ../linter-api/scripts/fix-linter-constructor.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'

      - id: fix-rule-options
        name: 'Fix stricter rule config schema (func-names, no-invalid-regexp, radix)'
        depends_on:
          - fix-linter-constructor
        js-ast-grep:
          js_file: ../linter-api/scripts/fix-rule-options.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'

      - id: fix-lint-message
        name: 'Remove LintMessage.nodeType property from object literals'
        depends_on:
          - fix-rule-options
        js-ast-grep:
          js_file: ../linter-api/scripts/fix-lint-message.ts
          include:
            - '**/*.js'
            - '**/*.mjs'
            - '**/*.cjs'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.mts'
            - '**/*.cts'
            - '**/*.tsx'
          exclude:
            - '**/*.d.ts'
            - '**/*.d.mts'
            - '**/*.d.cts'
