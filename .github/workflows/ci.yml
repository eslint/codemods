name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format:check

      - run: pnpm run lint

      - run: pnpm run check-types

      - name: Run tests for changed codemods
        shell: bash
        run: |
          changed_paths=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})

          if echo "$changed_paths" | grep -qE '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.github/workflows/ci\.yml)$'; then
            pnpm test
            exit 0
          fi

          filters=$(
            echo "$changed_paths" \
              | grep '^codemods/' \
              | cut -d/ -f1-3 \
              | sort -u \
              | sed 's|^|--filter ./|' || true
          )

          if [ -z "$filters" ]; then
            echo "No codemod packages affected; skipping tests."
            exit 0
          fi

          # shellcheck disable=SC2086
          pnpm $filters test
